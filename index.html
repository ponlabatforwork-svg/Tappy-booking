<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAPPY - ระบบจองคิว</title>
    
    <!-- ฟอนต์ Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    fontFamily: { sans: ['Sarabun', 'sans-serif'] }, 
                    colors: { primary: '#1e293b', line: '#00C300' } 
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; font-size: 15px; }
        .hidden-section { display: none; }
        .rule-pass { color: #16a34a; }
        .rule-fail { color: #ef4444; }
        /* เทคนิคลบพื้นหลังสีขาวของภาพโลโก้ */
        .transparent-logo { mix-blend-mode: multiply; }
        /* ซ่อน Scrollbar เพื่อความสะอาดตาบนมือถือ */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-gray-800 antialiased flex items-center justify-center min-h-screen p-3 relative">

    <!-- ==================== CUSTOM POPUP MODAL ==================== -->
    <div id="customPopup" class="fixed inset-0 flex items-center justify-center z-50 hidden bg-black bg-opacity-50 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl p-5 max-w-[300px] w-full mx-4 transform transition-all scale-95 opacity-0 text-center" id="popupContent">
            <div id="popupIcon" class="mb-2 text-4xl"></div>
            <h3 id="popupTitle" class="text-xl font-bold mb-1"></h3>
            <p id="popupMessage" class="text-gray-600 mb-4 text-sm"></p>
            <button onclick="window.closePopup()" class="w-full bg-primary text-white py-2 rounded-lg hover:bg-gray-800 transition font-medium text-sm shadow-md">ตกลง</button>
        </div>
    </div>

    <!-- Container (ปรับขนาดเล็กลงสำหรับมือถือ) -->
    <div class="w-full max-w-[360px] bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 my-4">
        
        <!-- Logo Section -->
        <div class="pt-6 pb-2 flex justify-center">
            <img src="https://img2.pic.in.th/18826.png" alt="Logo" class="h-14 object-contain transparent-logo">
        </div>

        <!-- ==================== LOGIN PAGE ==================== -->
        <div id="loginPage" class="p-5 pt-0">
            <h2 class="text-xl font-bold text-center mb-4 text-primary">เข้าสู่ระบบ</h2>
            <form id="loginForm" onsubmit="window.handleLogin(event)">
                <div class="mb-3">
                    <label class="block text-gray-600 mb-1 text-sm">อีเมลผู้ใช้</label>
                    <input type="email" id="loginEmail" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none text-sm transition">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-600 mb-1 text-sm">รหัสผ่าน</label>
                    <input type="password" id="loginPassword" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none text-sm transition">
                </div>
                <button type="submit" id="btnLogin" class="w-full bg-primary text-white py-2 rounded-lg hover:bg-gray-800 transition font-medium text-sm shadow-md">เข้าสู่ระบบ</button>
            </form>

            <div class="my-4 flex items-center">
                <hr class="flex-grow border-gray-200">
                <span class="mx-3 text-gray-400 text-xs">หรือ</span>
                <hr class="flex-grow border-gray-200">
            </div>

            <div class="space-y-2">
                <button type="button" onclick="window.handleSocialAuth('google')" class="w-full flex items-center justify-center border border-gray-300 py-2 rounded-lg hover:bg-gray-50 transition shadow-sm text-sm font-medium">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="h-4 w-4 mr-2" alt="Google"> เข้าใช้งานด้วย Google
                </button>
                <button type="button" onclick="window.handleSocialAuth('line')" class="w-full flex items-center justify-center bg-line text-white py-2 rounded-lg hover:bg-[#00a300] transition shadow-sm text-sm font-medium">
                    <i class="fa-brands fa-line text-lg mr-2"></i> เข้าใช้งานด้วย LINE
                </button>
            </div>

            <p class="mt-5 text-center text-gray-600 text-sm">
                ยังไม่มีบัญชี? | <a href="#" onclick="window.togglePage('registerPage')" class="text-primary font-bold hover:underline">สมัครเลย</a>
            </p>
        </div>

        <!-- ==================== REGISTER PAGE ==================== -->
        <div id="registerPage" class="hidden-section p-5 pt-0">
            <h2 class="text-xl font-bold text-center mb-4 text-primary">สร้างบัญชีใหม่</h2>
            <form id="registerForm" onsubmit="window.handleRegister(event)">
                
                <div class="mb-3">
                    <label class="block text-gray-600 mb-1 text-sm">ชื่อ - นามสกุล</label>
                    <input type="text" id="regName" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none text-sm">
                </div>

                <div class="mb-3">
                    <label class="block text-gray-600 mb-1 text-sm">เบอร์โทรศัพท์ (10 หลัก)</label>
                    <input type="tel" id="regPhone" pattern="[0-9]{10}" maxlength="10" placeholder="08xxxxxxxx" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none text-sm">
                </div>

                <div class="mb-3">
                    <label class="block text-gray-600 mb-1 text-sm">อีเมล</label>
                    <div class="flex space-x-2">
                        <input type="email" id="emailInput" required class="flex-grow px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none text-sm">
                        <button type="button" onclick="window.requestOTP()" class="px-3 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition text-xs font-medium whitespace-nowrap">รับรหัส</button>
                    </div>
                    <div id="otpSection" class="hidden mt-2">
                        <input type="text" id="otpInput" placeholder="รหัส OTP 6 หลัก" class="w-full px-3 py-2 border border-green-300 bg-green-50 rounded-lg focus:ring-2 focus:ring-green-500 outline-none text-sm">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="block text-gray-600 mb-1 text-sm">ชื่อผู้ใช้</label>
                    <input type="text" id="regUsername" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none text-sm">
                </div>

                <div class="mb-3">
                    <label class="block text-gray-600 mb-1 text-sm">สร้างรหัสผ่าน</label>
                    <input type="password" id="regPassword" onkeyup="window.validatePassword()" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none mb-2 text-sm">
                    <div class="text-xs bg-gray-50 p-2.5 rounded-lg border border-gray-200">
                        <ul class="space-y-0.5 leading-tight">
                            <li id="rule-length" class="rule-fail"><i class="fa-solid fa-xmark w-3 text-center"></i> อย่างน้อย 12 ตัวอักษร</li>
                            <li id="rule-upper" class="rule-fail"><i class="fa-solid fa-xmark w-3 text-center"></i> ตัวพิมพ์ใหญ่ (A-Z) 1 ตัว</li>
                            <li id="rule-lower" class="rule-fail"><i class="fa-solid fa-xmark w-3 text-center"></i> ตัวพิมพ์เล็ก (a-z) 1 ตัว</li>
                            <li id="rule-number" class="rule-fail"><i class="fa-solid fa-xmark w-3 text-center"></i> ตัวเลข (0-9) 1 ตัว</li>
                            <li id="rule-special" class="rule-fail"><i class="fa-solid fa-xmark w-3 text-center"></i> อักขระพิเศษ (!@#$%^&*) 1 ตัว</li>
                        </ul>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="block text-gray-600 mb-1 text-sm">ยืนยันรหัสผ่าน</label>
                    <input type="password" id="regConfirmPassword" onkeyup="window.checkPasswordMatch()" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none text-sm">
                    <p id="passwordMatchError" class="text-red-500 text-xs mt-1 hidden">รหัสผ่านไม่ตรงกัน</p>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-600 mb-1 text-sm">รหัสความปลอดภัย</label>
                    <div class="flex items-center space-x-2 mb-2">
                        <div id="captchaBox" class="bg-gray-100 border border-gray-300 font-mono text-xl tracking-[0.2em] px-3 py-1.5 rounded-lg font-bold text-gray-700 select-none w-28 text-center"></div>
                        <button type="button" onclick="window.generateCaptcha()" class="p-2 text-gray-500 hover:text-primary transition bg-gray-50 border border-gray-200 rounded-lg" title="เปลี่ยนรหัส"><i class="fa-solid fa-rotate-right"></i></button>
                        <button type="button" onclick="window.speakCaptcha()" class="p-2 text-gray-500 hover:text-primary transition bg-gray-50 border border-gray-200 rounded-lg" title="อ่านออกเสียง"><i class="fa-solid fa-volume-high"></i></button>
                    </div>
                    <input type="text" id="captchaInput" placeholder="ตัวเลขที่เห็น" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none text-sm">
                </div>

                <!-- เชื่อมต่อ Social Real Integration -->
                <div class="mb-4 border-t border-gray-200 pt-3">
                    <label class="block text-gray-600 mb-2 text-sm font-medium">ผูกบัญชีโซเชียล (ตัวเลือก)</label>
                    <div class="flex space-x-2">
                        <button type="button" onclick="window.handleSocialAuth('google')" class="flex-1 flex items-center justify-center border border-gray-300 py-1.5 rounded-lg hover:bg-gray-50 transition text-gray-600 shadow-sm text-sm">
                            <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="h-4 w-4 mr-1"> ผูก Google
                        </button>
                        <button type="button" onclick="window.handleSocialAuth('line')" class="flex-1 flex items-center justify-center bg-line text-white py-1.5 rounded-lg hover:bg-[#00a300] transition shadow-sm text-sm">
                            <i class="fa-brands fa-line mr-1 text-base"></i> ผูก LINE
                        </button>
                    </div>
                </div>

                <div class="mb-4 border-t border-gray-200 pt-3">
                    <label class="flex items-start cursor-pointer">
                        <input type="checkbox" required class="mt-1 mr-2 w-4 h-4 text-primary bg-gray-100 border-gray-300 rounded focus:ring-primary">
                        <span class="text-xs text-gray-500 leading-tight">
                            ฉันยินยอมให้ TAPPY เก็บรวบรวมและประมวลผลข้อมูลตามนโยบายความเป็นส่วนตัว
                        </span>
                    </label>
                </div>

                <button type="submit" id="btnRegister" class="w-full bg-primary text-white py-2 rounded-lg hover:bg-gray-800 transition font-bold text-sm shadow-md">สมัครสมาชิก</button>
                
                <p class="mt-4 text-center text-gray-600 text-sm">
                    <a href="#" onclick="window.togglePage('loginPage')" class="hover:underline font-medium"><i class="fa-solid fa-arrow-left mr-1"></i> กลับไปหน้าล็อกอิน</a>
                </p>
            </form>
        </div>
    </div>

    <!-- FIREBASE & LOGIC SCRIPT -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { 
            getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
            signInWithRedirect, getRedirectResult, GoogleAuthProvider, OAuthProvider
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // ================= FIREBASE CONFIG =================
        const firebaseConfig = {
            apiKey: "AIzaSyAzPmv7OVKbm2jBvBZKr16gRBjmplB9rEU",
            authDomain: "tappy-boking.firebaseapp.com",
            projectId: "tappy-boking",
            storageBucket: "tappy-boking.firebasestorage.app",
            messagingSenderId: "155079306623",
            appId: "1:155079306623:web:2c7e73cc6e619247c6be4a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ================= CUSTOM POPUP =================
        let popupCallback = null;

        window.showPopup = (title, message, type = 'info', callback = null) => {
            const popup = document.getElementById('customPopup');
            const content = document.getElementById('popupContent');
            const icon = document.getElementById('popupIcon');
            const titleEl = document.getElementById('popupTitle');
            const msgEl = document.getElementById('popupMessage');
            
            popupCallback = callback;
            titleEl.innerText = title;
            msgEl.innerText = message;

            if (type === 'success') {
                icon.innerHTML = '<i class="fa-solid fa-circle-check text-green-500"></i>';
                titleEl.className = "text-xl font-bold mb-1 text-green-600";
            } else if (type === 'error') {
                icon.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500"></i>';
                titleEl.className = "text-xl font-bold mb-1 text-red-600";
            } else {
                icon.innerHTML = '<i class="fa-solid fa-circle-info text-blue-500"></i>';
                titleEl.className = "text-xl font-bold mb-1 text-blue-600";
            }

            popup.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        };

        window.closePopup = () => {
            const popup = document.getElementById('customPopup');
            const content = document.getElementById('popupContent');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                popup.classList.add('hidden');
                if (popupCallback) {
                    popupCallback();
                    popupCallback = null;
                }
            }, 200);
        };

        // ================= UI LOGIC =================
        window.currentCaptcha = "";
        
        window.togglePage = (pageId) => {
            document.getElementById('loginPage').classList.add('hidden-section');
            document.getElementById('registerPage').classList.add('hidden-section');
            document.getElementById(pageId).classList.remove('hidden-section');
            if(pageId === 'registerPage') window.generateCaptcha();
        }

        window.requestOTP = () => {
            const email = document.getElementById('emailInput').value;
            if(!email) return window.showPopup("ผิดพลาด", "กรุณากรอกอีเมลก่อน", "error");
            document.getElementById('otpSection').classList.remove('hidden');
            window.showPopup("สำเร็จ", "ส่งรหัส OTP เรียบร้อยแล้ว", "success");
        }

        window.validatePassword = () => {
            const pwd = document.getElementById('regPassword').value;
            const rules = [
                { id: 'rule-length', regex: /.{12,}/ }, { id: 'rule-upper', regex: /[A-Z]/ },
                { id: 'rule-lower', regex: /[a-z]/ }, { id: 'rule-number', regex: /[0-9]/ },
                { id: 'rule-special', regex: /[!@#$%^&*]/ }
            ];
            rules.forEach(rule => {
                const el = document.getElementById(rule.id);
                if (rule.regex.test(pwd)) {
                    el.className = 'rule-pass'; el.innerHTML = `<i class="fa-solid fa-check w-3 text-center"></i> ${el.innerText}`;
                } else {
                    el.className = 'rule-fail'; el.innerHTML = `<i class="fa-solid fa-xmark w-3 text-center"></i> ${el.innerText}`;
                }
            });
            window.checkPasswordMatch();
        }

        window.checkPasswordMatch = () => {
            const pwd = document.getElementById('regPassword').value;
            const confirmPwd = document.getElementById('regConfirmPassword').value;
            const errorMsg = document.getElementById('passwordMatchError');
            if (confirmPwd.length > 0 && pwd !== confirmPwd) errorMsg.classList.remove('hidden');
            else errorMsg.classList.add('hidden');
        }

        window.generateCaptcha = () => {
            window.currentCaptcha = Math.floor(100000 + Math.random() * 900000).toString();
            document.getElementById('captchaBox').innerText = window.currentCaptcha;
            document.getElementById('captchaInput').value = "";
        }

        window.speakCaptcha = () => {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(window.currentCaptcha.split('').join(' '));
                utterance.lang = 'th-TH'; utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            }
        }

        // ================= REAL SOCIAL AUTH LOGIC (Google + LINE) =================
        
        getRedirectResult(auth).then(async (result) => {
            if (result !== null) {
                const user = result.user;
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                // ตรวจสอบและบันทึกข้อมูลหากเป็นผู้ใช้ใหม่
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        fullName: user.displayName || "ผู้ใช้โซเชียล",
                        email: user.email || "",
                        phone: "",
                        username: user.email ? user.email.split('@')[0] : "user_" + user.uid.substring(0,5),
                        provider: result.providerId || "social",
                        createdAt: new Date()
                    });
                }
                
                window.showPopup("สำเร็จ", `ยินดีต้อนรับ ${user.displayName || 'เข้าสู่ระบบ'}`, "success", () => {
                    window.location.href = 'dashboard.html';
                });
            }
        }).catch((error) => {
            console.error("Auth Error:", error);
            window.showPopup("ข้อผิดพลาด", "การตรวจสอบสิทธิ์ล้มเหลว", "error");
        });

        // ฟังก์ชันล็อกอิน/ผูกบัญชีด้วย Google และ LINE (ของจริง)
        window.handleSocialAuth = (providerName) => {
            let provider;
            if (providerName === 'google') {
                provider = new GoogleAuthProvider();
            } else if (providerName === 'line') {
                // เชื่อมต่อ LINE ผ่าน Firebase OIDC (ต้องตั้งค่า oidc.line ใน Firebase Console)
                provider = new OAuthProvider('oidc.line');
            }
            // ใช้ Redirect เพื่อให้รองรับมือถือและ LINE LIFF 100% ไม่มีบั๊กเด้งออก
            signInWithRedirect(auth, provider);
        }

        // ================= EMAIL AUTH LOGIC =================
        window.handleRegister = async (e) => {
            e.preventDefault();
            
            const inputCaptcha = document.getElementById('captchaInput').value;
            if(inputCaptcha !== window.currentCaptcha) {
                window.generateCaptcha();
                return window.showPopup("ผิดพลาด", "รหัสความปลอดภัยไม่ถูกต้อง", "error");
            }
            if(document.querySelectorAll('.rule-fail').length > 0) return window.showPopup("ผิดพลาด", "รหัสผ่านยังไม่ตรงเงื่อนไข", "error");
            if(document.getElementById('regPassword').value !== document.getElementById('regConfirmPassword').value) return window.showPopup("ผิดพลาด", "รหัสผ่านไม่ตรงกัน", "error");

            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('regPassword').value;
            const fullName = document.getElementById('regName').value;
            const phone = document.getElementById('regPhone').value;
            const username = document.getElementById('regUsername').value;
            const btn = document.getElementById('btnRegister');
            
            btn.innerText = "กำลังสร้าง...";
            btn.disabled = true;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                await setDoc(doc(db, "users", user.uid), {
                    fullName: fullName, email: email, phone: phone, username: username,
                    provider: "email", createdAt: new Date()
                });

                window.showPopup("สำเร็จ!", "สร้างบัญชีเรียบร้อยแล้ว", "success", () => {
                    document.getElementById('registerForm').reset();
                    window.togglePage('loginPage');
                });
            } catch (error) {
                window.showPopup("ล้มเหลว", error.message, "error");
            } finally {
                btn.innerText = "สมัครสมาชิก";
                btn.disabled = false;
            }
        }

        window.handleLogin = async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('btnLogin');
            
            btn.innerText = "กำลังตรวจสอบ...";
            btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.showPopup("สำเร็จ", "กำลังเข้าสู่ระบบ...", "success", () => {
                    window.location.href = 'dashboard.html';
                });
            } catch (error) {
                window.showPopup("ผิดพลาด", "ข้อมูลไม่ถูกต้อง", "error");
            } finally {
                btn.innerText = "เข้าสู่ระบบ";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
