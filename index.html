<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAPPY | ระบบสมาชิกและจองคิว</title>
    
    <!-- Google Font: Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    fontFamily: { sans: ['Sarabun', 'sans-serif'] }, 
                    colors: { primary: '#0f172a', line: '#06c755', sms: '#2563eb' } 
                }
            }
        }
    </script>
    <style>
        body { background: #f1f5f9; font-family: 'Sarabun', sans-serif; font-size: 15px; }
        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .transparent-logo { mix-blend-mode: multiply; }
        .hidden-section { display: none; }
        .rule-pass { color: #059669; }
        .rule-fail { color: #dc2626; }
        ::-webkit-scrollbar { display: none; }
        
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #0f172a;
            border-radius: 50%; width: 44px; height: 44px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 relative">

    <!-- ==================== GLOBAL LOADING SCREEN ==================== -->
    <div id="globalLoader" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="loader mb-4"></div>
        <p class="text-primary font-semibold text-lg tracking-wide">กำลังตรวจสอบสิทธิ์...</p>
    </div>

    <!-- ==================== CUSTOM POPUP MODAL ==================== -->
    <div id="customPopup" class="fixed inset-0 flex items-center justify-center z-50 hidden bg-black bg-opacity-50 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-[320px] w-full mx-4 transform transition-all scale-95 opacity-0 text-center" id="popupContent">
            <div id="popupIcon" class="mb-3 text-5xl"></div>
            <h3 id="popupTitle" class="text-xl font-bold mb-2"></h3>
            <p id="popupMessage" class="text-gray-600 mb-6 text-sm leading-relaxed"></p>
            <button onclick="window.closePopup()" id="popupBtn" class="w-full bg-primary text-white py-2.5 rounded-xl hover:bg-gray-800 transition font-bold shadow-md tracking-wide text-sm">ตกลง</button>
        </div>
    </div>

    <!-- ==================== MAIN CONTAINER ==================== -->
    <div class="w-full max-w-[420px] glass-card rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-gray-100 overflow-hidden my-4 hidden" id="mainContainer">
        
        <!-- Logo Header -->
        <div class="pt-10 pb-4 flex flex-col items-center">
            <img src="https://img1.pic.in.th/images/IMG_0018.png" alt="Logo" class="h-20 w-auto object-contain transparent-logo mb-2">
            <h1 class="text-xl font-bold text-primary tracking-wide">ระบบสมาชิก TAPPY</h1>
            <p class="text-gray-500 text-sm">กรุณาเข้าสู่ระบบเพื่อดำเนินการ</p>
        </div>

        <!-- ==================== LOGIN SECTION ==================== -->
        <div id="loginPage" class="px-8 pb-10">
            
            <div class="flex border-b border-gray-200 mb-4 text-sm font-bold">
                <button onclick="window.switchLoginMode('email')" id="btnTabEmail" class="w-1/2 pb-2 text-primary border-b-2 border-primary text-center transition-all">ใช้อีเมล</button>
                <button onclick="window.switchLoginMode('phone')" id="btnTabPhone" class="w-1/2 pb-2 text-gray-400 text-center transition-all">ใช้เบอร์โทรศัพท์</button>
            </div>

            <form id="loginForm" onsubmit="window.handleLogin(event)" class="space-y-4">
                <div>
                    <input type="email" id="loginEmail" placeholder="อีเมล" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none transition duration-200">
                </div>
                <div>
                    <input type="password" id="loginPassword" placeholder="รหัสผ่าน" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none transition duration-200">
                </div>
                <button type="submit" id="btnLogin" class="w-full bg-primary text-white py-3 rounded-xl font-semibold hover:bg-black transition duration-200 shadow-md tracking-wide">เข้าสู่ระบบ</button>
            </form>

            <form id="phoneLoginForm" onsubmit="window.handlePhoneLoginVerify(event)" class="space-y-4 hidden-section">
                <div class="flex space-x-2">
                    <input type="tel" id="loginPhoneInput" pattern="[0-9]{10}" maxlength="10" placeholder="เบอร์โทรศัพท์ (10 หลัก)" required class="flex-grow px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none text-sm font-medium">
                    <button type="button" id="btnSendLoginSMS" onclick="window.handlePhoneLoginSendSMS()" class="px-3 py-3 bg-sms text-white rounded-xl hover:bg-blue-700 transition text-sm font-bold whitespace-nowrap shadow-sm">รับ SMS OTP</button>
                </div>
                
                <div id="loginOtpSection" class="hidden-section">
                    <input type="text" id="loginOtpInput" placeholder="รหัส OTP 6 หลัก" class="w-full px-4 py-3 border border-blue-400 bg-blue-50 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold tracking-widest text-center">
                    <button type="submit" id="btnVerifyPhoneLogin" class="w-full bg-primary text-white py-3 rounded-xl font-semibold hover:bg-black transition duration-200 shadow-md tracking-wide mt-3">ยืนยันเพื่อเข้าสู่ระบบ</button>
                </div>
            </form>

            <div id="recaptcha-container" class="mt-2 flex justify-center scale-90 origin-top"></div>

            <div class="my-5 flex items-center text-xs text-gray-400 uppercase tracking-widest font-semibold">
                <hr class="flex-grow border-gray-200"><span class="mx-3">หรือ</span><hr class="flex-grow border-gray-200">
            </div>

            <div class="space-y-3">
                <button type="button" onclick="window.handleSocialAuth('google')" class="w-full flex items-center justify-center border border-gray-200 py-3 rounded-xl hover:bg-gray-50 transition duration-200 text-sm font-semibold text-gray-700">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="h-5 w-5 mr-3"> เข้าใช้งานด้วย Google
                </button>
                <button type="button" onclick="window.handleSocialAuth('line')" class="w-full flex items-center justify-center bg-line text-white py-3 rounded-xl hover:bg-green-600 transition duration-200 text-sm font-semibold shadow-sm">
                    <i class="fa-brands fa-line text-xl mr-3"></i> เข้าใช้งานด้วย LINE
                </button>
            </div>

            <p class="mt-6 text-center text-sm text-gray-600 font-medium">
                ยังไม่มีบัญชี? <a href="#" onclick="window.togglePage('registerPage')" class="text-primary font-bold hover:underline">สมัครสมาชิก</a>
            </p>
        </div>

        <!-- ==================== REGISTER SECTION ==================== -->
        <div id="registerPage" class="hidden-section px-8 pb-10">
            <hr class="mb-6 border-gray-200">
            <h2 class="text-lg font-bold text-center mb-4 text-primary">สร้างบัญชีใหม่</h2>
            
            <form id="registerForm" onsubmit="window.handleRegister(event)" class="space-y-4">
                
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 mb-6">
                    <label class="block text-primary mb-2 text-sm font-bold text-center">ผูกบัญชีโซเชียลเพื่อสมัครสมาชิก</label>
                    <div class="flex space-x-2">
                        <button type="button" id="btnLinkGoogle" onclick="window.linkSocialAuth('google')" class="flex-1 flex items-center justify-center border border-gray-300 bg-white py-2 rounded-lg hover:bg-gray-50 transition text-gray-600 shadow-sm text-sm font-semibold">
                            <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="h-4 w-4 mr-2"> ผูก Google
                        </button>
                        <button type="button" id="btnLinkLine" onclick="window.linkSocialAuth('line')" class="flex-1 flex items-center justify-center bg-line text-white py-2 rounded-lg hover:bg-[#00a300] transition shadow-sm text-sm font-semibold">
                            <i class="fa-brands fa-line mr-2 text-base"></i> ผูก LINE
                        </button>
                    </div>
                </div>

                <div>
                    <input type="text" id="regName" placeholder="ชื่อ - นามสกุล" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none">
                </div>

                <div>
                    <input type="email" id="emailInput" placeholder="อีเมล" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none">
                </div>

                <!-- ระบบ SMS OTP จริงสำหรับหน้าสร้างบัญชี -->
                <div class="bg-gray-50 p-3 rounded-xl border border-gray-200">
                    <label class="block text-gray-500 mb-2 text-xs ml-1 font-bold">ยืนยันเบอร์มือถือด้วย SMS OTP</label>
                    <div class="flex space-x-2">
                        <input type="tel" id="regPhone" pattern="[0-9]{10}" maxlength="10" placeholder="เบอร์โทรศัพท์ (10 หลัก)" required class="flex-grow px-3 py-2.5 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary outline-none text-sm font-medium">
                        <button type="button" id="btnRegSendSMS" onclick="window.sendRegSMS()" class="px-3 py-2.5 bg-sms text-white rounded-lg hover:bg-blue-700 transition text-sm font-bold whitespace-nowrap shadow-sm">รับ OTP</button>
                    </div>
                    <div id="regRecaptchaContainer" class="mt-2 flex justify-center scale-90 origin-top"></div>
                    
                    <div id="regOtpSection" class="hidden-section mt-2">
                        <input type="text" id="regOtpInput" placeholder="รหัส OTP 6 หลัก" class="w-full px-3 py-2.5 border border-green-400 bg-green-50 rounded-lg focus:ring-2 focus:ring-green-500 outline-none text-sm font-bold tracking-widest text-center">
                    </div>
                </div>

                <div>
                    <input type="text" id="regUsername" placeholder="ชื่อผู้ใช้ (Username)" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none mt-2">
                </div>

                <div>
                    <input type="password" id="regPassword" placeholder="สร้างรหัสผ่าน" onkeyup="window.validatePassword()" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none">
                    <div class="text-xs bg-gray-50 p-3 mt-2 rounded-xl border border-gray-200 text-gray-500 font-medium">
                        <ul class="space-y-1.5 leading-tight">
                            <li id="rule-length" class="rule-fail"><i class="fa-solid fa-xmark w-4 text-center"></i> 12 ตัวอักษรขึ้นไป</li>
                            <li id="rule-upper" class="rule-fail"><i class="fa-solid fa-xmark w-4 text-center"></i> พิมพ์ใหญ่ (A-Z) 1 ตัว</li>
                            <li id="rule-lower" class="rule-fail"><i class="fa-solid fa-xmark w-4 text-center"></i> พิมพ์เล็ก (a-z) 1 ตัว</li>
                            <li id="rule-number" class="rule-fail"><i class="fa-solid fa-xmark w-4 text-center"></i> ตัวเลข (0-9) 1 ตัว</li>
                            <li id="rule-special" class="rule-fail"><i class="fa-solid fa-xmark w-4 text-center"></i> อักขระพิเศษ 1 ตัว</li>
                        </ul>
                    </div>
                </div>

                <div>
                    <input type="password" id="regConfirmPassword" placeholder="ยืนยันรหัสผ่าน" onkeyup="window.checkPasswordMatch()" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none">
                    <p id="passwordMatchError" class="text-red-500 text-xs mt-1 ml-1 hidden font-semibold">รหัสผ่านไม่ตรงกัน</p>
                </div>

                <div>
                    <label class="block text-gray-500 mb-1 text-xs ml-1 font-semibold">รหัสความปลอดภัย (ป้องกันบอท)</label>
                    <div class="flex items-center space-x-2 mb-2">
                        <div id="captchaBox" class="bg-gray-100 border border-gray-200 font-mono text-xl tracking-[0.2em] px-3 py-2 rounded-xl font-bold text-gray-600 select-none w-32 text-center"></div>
                        <button type="button" onclick="window.generateCaptcha()" class="p-2.5 text-gray-400 hover:text-primary transition bg-gray-50 border border-gray-200 rounded-xl"><i class="fa-solid fa-rotate-right"></i></button>
                    </div>
                    <input type="text" id="captchaInput" placeholder="กรอกตัวเลขด้านบน" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none font-semibold text-center tracking-widest">
                </div>

                <div class="pt-2">
                    <label class="flex items-start cursor-pointer">
                        <input type="checkbox" required class="mt-1 mr-2 w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary">
                        <span class="text-xs text-gray-500 leading-tight font-medium">
                            ฉันยินยอมให้ TAPPY เก็บรวบรวมและประมวลผลข้อมูลส่วนบุคคล
                        </span>
                    </label>
                </div>

                <button type="submit" id="btnRegister" class="w-full bg-primary text-white py-3 rounded-xl hover:bg-black transition font-bold shadow-md mt-2 tracking-wide">ยืนยันการสมัครสมาชิก</button>
                
                <p class="mt-4 text-center text-sm text-gray-500">
                    <a href="#" onclick="window.togglePage('loginPage')" class="hover:underline font-bold text-primary"><i class="fa-solid fa-arrow-left mr-1"></i> ย้อนกลับ</a>
                </p>
            </form>
        </div>
    </div>

    <!-- FIREBASE & LOGIC SCRIPT -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { 
            getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
            signInWithRedirect, getRedirectResult, GoogleAuthProvider, OAuthProvider, updatePassword,
            RecaptchaVerifier, signInWithPhoneNumber, PhoneAuthProvider, linkWithCredential
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzPmv7OVKbm2jBvBZKr16gRBjmplB9rEU",
            authDomain: "tappy-boking.firebaseapp.com",
            projectId: "tappy-boking",
            storageBucket: "tappy-boking.firebasestorage.app",
            messagingSenderId: "155079306623",
            appId: "1:155079306623:web:2c7e73cc6e619247c6be4a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ================= CUSTOM POPUP CONTROL =================
        let popupCallback = null;
        window.showPopup = (title, message, type = 'info', btnText = 'ตกลง', callback = null) => {
            const popup = document.getElementById('customPopup');
            const content = document.getElementById('popupContent');
            const icon = document.getElementById('popupIcon');
            const titleEl = document.getElementById('popupTitle');
            const msgEl = document.getElementById('popupMessage');
            const btn = document.getElementById('popupBtn');
            
            popupCallback = callback;
            titleEl.innerText = title;
            msgEl.innerText = message;
            btn.innerText = btnText;

            if (type === 'success') {
                icon.innerHTML = '<i class="fa-solid fa-circle-check text-green-500"></i>';
                titleEl.className = "text-xl font-bold mb-1 text-green-600";
            } else if (type === 'error') {
                icon.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500"></i>';
                titleEl.className = "text-xl font-bold mb-1 text-red-600";
            } else {
                icon.innerHTML = '<i class="fa-solid fa-circle-info text-blue-500"></i>';
                titleEl.className = "text-xl font-bold mb-1 text-blue-600";
            }

            popup.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        };

        window.closePopup = () => {
            const popup = document.getElementById('customPopup');
            const content = document.getElementById('popupContent');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                popup.classList.add('hidden');
                if (popupCallback) { popupCallback(); popupCallback = null; }
            }, 200);
        };

        // ================= UI STATE NAV =================
        window.currentCaptcha = "";
        window.loginConfirmationResult = null; // สำหรับล็อกอิน
        window.regConfirmationResult = null;   // สำหรับสมัครสมาชิก
        
        window.togglePage = (pageId) => {
            document.getElementById('loginPage').classList.add('hidden-section');
            document.getElementById('registerPage').classList.add('hidden-section');
            document.getElementById(pageId).classList.remove('hidden-section');
            
            if(pageId === 'registerPage') {
                window.generateCaptcha();
                // เปิดการทำงาน reCAPTCHA สำหรับหน้าสมัครสมาชิก
                if(!window.regRecaptchaVerifier) {
                    window.regRecaptchaVerifier = new RecaptchaVerifier(auth, 'regRecaptchaContainer', { 'size': 'normal' });
                    window.regRecaptchaVerifier.render();
                }
            }
        }

        window.hideLoader = () => {
            const loader = document.getElementById('globalLoader');
            loader.classList.add('opacity-0');
            setTimeout(() => {
                loader.classList.add('hidden');
                document.getElementById('mainContainer').classList.remove('hidden');
            }, 300);
        }

        window.switchLoginMode = (mode) => {
            const btnEmail = document.getElementById('btnTabEmail');
            const btnPhone = document.getElementById('btnTabPhone');
            const formEmail = document.getElementById('loginForm');
            const formPhone = document.getElementById('phoneLoginForm');

            if(mode === 'email') {
                btnEmail.className = "w-1/2 pb-2 text-primary border-b-2 border-primary text-center transition-all";
                btnPhone.className = "w-1/2 pb-2 text-gray-400 text-center transition-all";
                formEmail.classList.remove('hidden-section');
                formPhone.classList.add('hidden-section');
            } else {
                btnPhone.className = "w-1/2 pb-2 text-primary border-b-2 border-primary text-center transition-all";
                btnEmail.className = "w-1/2 pb-2 text-gray-400 text-center transition-all";
                formPhone.classList.remove('hidden-section');
                formEmail.classList.add('hidden-section');
                
                // เปิดการทำงาน reCAPTCHA สำหรับหน้าล็อกอิน
                if(!window.loginRecaptchaVerifier) {
                    window.loginRecaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'normal' });
                    window.loginRecaptchaVerifier.render();
                }
            }
        }

        function updateLinkButtonStatus(providerName) {
            const btn = document.getElementById(providerName === 'Google' ? 'btnLinkGoogle' : 'btnLinkLine');
            if (btn) {
                btn.className = "flex-1 flex items-center justify-center bg-green-50 border border-green-500 text-green-600 py-2 rounded-lg text-sm font-bold shadow-sm cursor-not-allowed";
                btn.innerHTML = `<i class="fa-solid fa-circle-check mr-2"></i> ผูกด้วย ${providerName} แล้ว`;
                btn.removeAttribute('onclick');
            }
        }

        // ================= PHONE AUTH: LOGIN =================
        window.handlePhoneLoginSendSMS = async () => {
            const rawPhone = document.getElementById('loginPhoneInput').value;
            if(!rawPhone || rawPhone.length !== 10) return window.showPopup("ผิดพลาด", "กรุณากรอกเบอร์โทรศัพท์ 10 หลัก", "error");
            
            const formattedPhone = "+66" + rawPhone.substring(1);
            const btn = document.getElementById('btnSendLoginSMS');
            btn.innerText = "กำลังส่ง..."; btn.disabled = true;

            try {
                const q = query(collection(db, "users"), where("phone", "==", rawPhone));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    btn.innerText = "รับ SMS OTP"; btn.disabled = false;
                    return window.showPopup("ไม่พบบัญชี", "ไม่พบบัญชีที่ผูกกับเบอร์โทรศัพท์นี้ กรุณาสร้างบัญชีใหม่", "error", "สร้างบัญชี", () => {
                        window.togglePage('registerPage');
                        document.getElementById('regPhone').value = rawPhone;
                    });
                }

                window.loginConfirmationResult = await signInWithPhoneNumber(auth, formattedPhone, window.loginRecaptchaVerifier);
                document.getElementById('loginOtpSection').classList.remove('hidden-section');
                window.showPopup("สำเร็จ", "รหัส OTP ถูกส่งไปที่เบอร์ของคุณแล้ว", "success");
                btn.innerText = "ส่งอีกครั้ง"; btn.disabled = false;
            } catch (error) {
                console.error(error);
                window.showPopup("ผิดพลาด", "ไม่สามารถส่งข้อความได้ กรุณาตรวจสอบการตั้งค่า reCAPTCHA", "error");
                btn.innerText = "รับ SMS OTP"; btn.disabled = false;
            }
        }

        window.handlePhoneLoginVerify = async (e) => {
            e.preventDefault();
            const code = document.getElementById('loginOtpInput').value;
            const btn = document.getElementById('btnVerifyPhoneLogin');
            
            if(!window.loginConfirmationResult) return window.showPopup("ผิดพลาด", "ไม่พบรหัส OTP", "error");
            
            btn.innerText = "กำลังยืนยัน..."; btn.disabled = true;

            try {
                await window.loginConfirmationResult.confirm(code);
                window.location.href = 'dashboard.html';
            } catch (error) {
                window.showPopup("ผิดพลาด", "รหัส OTP ไม่ถูกต้อง", "error");
                btn.innerText = "ยืนยันเพื่อเข้าสู่ระบบ"; btn.disabled = false;
            }
        }

        // ================= PHONE AUTH: REGISTRATION =================
        window.sendRegSMS = async () => {
            const rawPhone = document.getElementById('regPhone').value;
            if(!rawPhone || rawPhone.length !== 10) return window.showPopup("ผิดพลาด", "กรุณากรอกเบอร์โทรศัพท์ให้ครบถ้วน", "error");

            const formattedPhone = "+66" + rawPhone.substring(1);
            const btn = document.getElementById('btnRegSendSMS');
            btn.innerText = "กำลังส่ง..."; btn.disabled = true;

            try {
                // ดักจับการสมัครซ้ำด้วยเบอร์เดิม
                const q = query(collection(db, "users"), where("phone", "==", rawPhone));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    btn.innerText = "รับ OTP"; btn.disabled = false;
                    return window.showPopup("เบอร์นี้ซ้ำ", "เบอร์โทรศัพท์นี้ถูกใช้สมัครสมาชิกไปแล้ว กรุณาเข้าสู่ระบบ", "error", "ไปหน้าล็อกอิน", () => {
                        window.togglePage('loginPage');
                        window.switchLoginMode('phone');
                        document.getElementById('loginPhoneInput').value = rawPhone;
                    });
                }

                window.regConfirmationResult = await signInWithPhoneNumber(auth, formattedPhone, window.regRecaptchaVerifier);
                document.getElementById('regOtpSection').classList.remove('hidden-section');
                window.showPopup("ส่งรหัสสำเร็จ", "รหัส OTP ถูกส่งไปที่เบอร์มือถือของคุณแล้ว นำมากรอกเพื่อยืนยัน", "success");
                btn.innerText = "ส่งอีกครั้ง"; btn.disabled = false;
            } catch (error) {
                console.error(error);
                window.showPopup("ผิดพลาด", "จัดส่ง SMS ล้มเหลว โปรดตรวจสอบ reCAPTCHA", "error");
                btn.innerText = "รับ OTP"; btn.disabled = false;
            }
        }

        // ================= SMART ROUTING AFTER SOCIAL REDIRECT =================
        getRedirectResult(auth).then(async (result) => {
            if (result !== null) {
                const user = result.user;
                const userSnap = await getDoc(doc(db, "users", user.uid));
                const actionOrigin = sessionStorage.getItem('auth_action_origin');

                if (userSnap.exists()) {
                    window.location.href = 'dashboard.html';
                } else {
                    window.hideLoader();
                    if (actionOrigin === 'register_page') {
                        window.togglePage('registerPage');
                        if(user.email) document.getElementById('emailInput').value = user.email;
                        if(user.displayName) document.getElementById('regName').value = user.displayName;
                        
                        const pId = result.providerId;
                        if (pId === 'google.com') updateLinkButtonStatus('Google');
                        if (pId === 'oidc.line') updateLinkButtonStatus('LINE');
                        
                        window.showPopup("ผูกบัญชีสำเร็จ", "ผูกระบบโซเชียลเรียบร้อย กรุณายืนยันเบอร์โทรศัพท์และข้อมูลที่เหลือ เพื่อทำการสมัคร", "success");
                    } else {
                        window.showPopup(
                            "ไม่พบบัญชี", "ไม่พบบัญชีที่ผูกกับโซเชียลนี้ สร้างบัญชีเลยเพื่อเริ่มต้นใช้งาน", "error", "สร้างบัญชี", 
                            () => {
                                window.togglePage('registerPage');
                                if(user.email) document.getElementById('emailInput').value = user.email;
                                if(user.displayName) document.getElementById('regName').value = user.displayName;
                                
                                const pId = result.providerId;
                                if (pId === 'google.com') updateLinkButtonStatus('Google');
                                if (pId === 'oidc.line') updateLinkButtonStatus('LINE');
                            }
                        );
                    }
                }
            } else {
                window.hideLoader();
            }
        }).catch((error) => {
            console.error(error);
            window.hideLoader();
            window.showPopup("ข้อผิดพลาด", "การยืนยันสิทธิ์ล้มเหลว", "error");
        });

        window.handleSocialAuth = (providerName) => {
            sessionStorage.setItem('auth_action_origin', 'login_page');
            let provider = providerName === 'google' ? new GoogleAuthProvider() : new OAuthProvider('oidc.line');
            signInWithRedirect(auth, provider);
        }

        window.linkSocialAuth = (providerName) => {
            sessionStorage.setItem('auth_action_origin', 'register_page');
            let provider = providerName === 'google' ? new GoogleAuthProvider() : new OAuthProvider('oidc.line');
            signInWithRedirect(auth, provider);
        }

        // ================= MASTER FORM REGISTER SUBMISSION =================
        window.handleRegister = async (e) => {
            e.preventDefault();
            
            const inputCaptcha = document.getElementById('captchaInput').value;
            if(inputCaptcha !== window.currentCaptcha) {
                window.generateCaptcha();
                return window.showPopup("ผิดพลาด", "รหัสความปลอดภัย(ตัวเลข) ไม่ถูกต้อง", "error");
            }
            if(document.querySelectorAll('.rule-fail').length > 0) return window.showPopup("ผิดพลาด", "รหัสผ่านยังไม่ตรงเงื่อนไข", "error");
            if(document.getElementById('regPassword').value !== document.getElementById('regConfirmPassword').value) return window.showPopup("ผิดพลาด", "รหัสผ่านไม่ตรงกัน", "error");

            const otpCode = document.getElementById('regOtpInput').value;
            if(!window.regConfirmationResult || !otpCode) {
                return window.showPopup("ผิดพลาด", "กรุณากด 'รับ OTP' และกรอกรหัสจาก SMS ให้เรียบร้อย", "error");
            }

            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('regPassword').value;
            const fullName = document.getElementById('regName').value;
            const phone = document.getElementById('regPhone').value;
            const username = document.getElementById('regUsername').value;
            const btn = document.getElementById('btnRegister');
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังประมวลผลข้อมูล...';
            btn.disabled = true;

            let finalUser = null;
            let isSocialLinked = !!auth.currentUser;

            try {
                // สร้าง Credential อ้างอิงจาก OTP ที่กรอกมา
                const phoneCredential = PhoneAuthProvider.credential(window.regConfirmationResult.verificationId, otpCode);

                if (isSocialLinked) {
                    // หากลูกค้าผูกโซเชียลมาแล้ว ให้เอาเบอร์นี้ไปผูกเพิ่ม
                    finalUser = auth.currentUser;
                    await linkWithCredential(finalUser, phoneCredential);
                    await updatePassword(finalUser, password);
                } else {
                    // หากไม่ได้ผูกโซเชียล ให้สร้างบัญชีด้วย Email ใหม่ แล้วผูกเบอร์มือถือตามไป
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    finalUser = userCredential.user;
                    await linkWithCredential(finalUser, phoneCredential);
                }
                
                // บันทึกโปรไฟล์ทั้งหมดลง Firestore
                await setDoc(doc(db, "users", finalUser.uid), {
                    fullName: fullName, email: email, phone: phone, username: username,
                    provider: isSocialLinked ? "social_phone" : "email_phone", 
                    createdAt: new Date()
                });

                window.showPopup("สมัครสมาชิกสำเร็จ!", "ระบบบันทึกบัญชีของท่านเรียบร้อยแล้ว กำลังนำเข้าสู่หน้าแดชบอร์ด", "success", "ตกลง", () => {
                    window.location.href = 'dashboard.html';
                });

            } catch (error) {
                console.error("Register Error Code:", error.code);
                
                // 🌟 Rollback System: หาก OTP ผิด แต่ระบบดันสร้างอีเมลไปแล้ว ให้ลบอีเมลทิ้ง เพื่อไม่ให้เป็นบัญชีผี
                if (!isSocialLinked && finalUser && error.code === 'auth/invalid-verification-code') {
                    await finalUser.delete();
                }

                if (error.code === 'auth/invalid-verification-code') {
                    window.showPopup("รหัส OTP ผิดพลาด", "รหัส OTP จาก SMS ไม่ถูกต้อง กรุณาตรวจสอบอีกครั้ง", "error");
                } else if (error.code === 'auth/email-already-in-use') {
                    window.showPopup("อีเมลถูกใช้งานแล้ว", "อีเมลนี้มีในระบบแล้ว หากเคยสมัครไว้ กรุณาเข้าสู่ระบบ", "error", "ตกลง", () => {
                        window.togglePage('loginPage');
                    });
                } else {
                    window.showPopup("สมัครสมาชิกไม่สำเร็จ", "ข้อผิดพลาดระบบ: " + error.message, "error");
                }
                
                btn.innerText = "ยืนยันการสมัครสมาชิก";
                btn.disabled = false;
            }
        }

        window.handleLogin = async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('btnLogin');
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังตรวจสอบ...';
            btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                window.showPopup("ผิดพลาด", "อีเมลหรือรหัสผ่านไม่ถูกต้อง", "error");
                btn.innerText = "เข้าสู่ระบบ";
                btn.disabled = false;
            }
        }

        // ================= COGNITIVE AND VALIDATION UTILITIES =================
        window.validatePassword = () => {
            const pwd = document.getElementById('regPassword').value;
            const rules = [
                { id: 'rule-length', regex: /.{12,}/ }, { id: 'rule-upper', regex: /[A-Z]/ },
                { id: 'rule-lower', regex: /[a-z]/ }, { id: 'rule-number', regex: /[0-9]/ },
                { id: 'rule-special', regex: /[!@#$%^&*]/ }
            ];
            rules.forEach(rule => {
                const el = document.getElementById(rule.id);
                if (rule.regex.test(pwd)) {
                    el.className = 'rule-pass'; el.innerHTML = `<i class="fa-solid fa-check w-4 text-center"></i> ${el.innerText.trim()}`;
                } else {
                    el.className = 'rule-fail'; el.innerHTML = `<i class="fa-solid fa-xmark w-4 text-center"></i> ${el.innerText.trim()}`;
                }
            });
            window.checkPasswordMatch();
        }

        window.checkPasswordMatch = () => {
            const pwd = document.getElementById('regPassword').value;
            const confirmPwd = document.getElementById('regConfirmPassword').value;
            const errorMsg = document.getElementById('passwordMatchError');
            if (confirmPwd.length > 0 && pwd !== confirmPwd) errorMsg.classList.remove('hidden');
            else errorMsg.classList.add('hidden');
        }

        window.generateCaptcha = () => {
            window.currentCaptcha = Math.floor(100000 + Math.random() * 900000).toString();
            document.getElementById('captchaBox').innerText = window.currentCaptcha;
            document.getElementById('captchaInput').value = "";
        }
    </script>
</body>
</html>
