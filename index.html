<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAPPY - ระบบจองคิว</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Prompt', 'sans-serif'] },
                    colors: { primary: '#1e293b', secondary: '#64748b' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; }
        .hidden-section { display: none; }
        .rule-pass { color: #16a34a; }
        .rule-fail { color: #ef4444; }
    </style>
</head>
<body class="text-gray-800 antialiased flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        
        <div class="pt-8 pb-4 flex justify-center">
            <img src="https://img2.pic.in.th/18826.png" alt="Logo" class="h-20 object-contain">
        </div>

        <div id="loginPage" class="p-8 pt-0">
            <h2 class="text-xl font-semibold text-center mb-6">เข้าสู่ระบบ</h2>
            <form id="loginForm" onsubmit="window.handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-sm text-gray-600 mb-1">อีเมลผู้ใช้</label>
                    <input type="email" id="loginEmail" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition">
                </div>
                <div class="mb-6">
                    <label class="block text-sm text-gray-600 mb-1">รหัสผ่าน</label>
                    <input type="password" id="loginPassword" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition">
                </div>
                <button type="submit" id="btnLogin" class="w-full bg-primary text-white py-2 rounded-lg hover:bg-gray-800 transition font-medium">เข้าสู่ระบบ</button>
            </form>

            <div class="my-6 flex items-center">
                <hr class="flex-grow border-gray-200">
                <span class="mx-4 text-sm text-gray-400">หรือ</span>
                <hr class="flex-grow border-gray-200">
            </div>

            <div class="space-y-3">
                <button type="button" onclick="window.handleSocialAuth('google')" class="w-full flex items-center justify-center border border-gray-300 py-2 rounded-lg hover:bg-gray-50 transition">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="h-5 w-5 mr-2" alt="Google">
                    เข้าใช้งานด้วย Google
                </button>
                <button type="button" onclick="window.handleSocialAuth('facebook')" class="w-full flex items-center justify-center bg-[#1877F2] text-white py-2 rounded-lg hover:bg-[#166fe5] transition">
                    <i class="fa-brands fa-facebook-f mr-2"></i>
                    เข้าใช้งานด้วย Facebook
                </button>
            </div>

            <p class="mt-8 text-center text-sm text-gray-600">
                ยังไม่มีบัญชี? | <a href="#" onclick="window.togglePage('registerPage')" class="text-primary font-semibold hover:underline">สมัครเลย</a>
            </p>
        </div>

        <div id="registerPage" class="hidden-section p-8 pt-0">
            <h2 class="text-xl font-semibold text-center mb-6">สร้างบัญชีใหม่</h2>
            <form id="registerForm" onsubmit="window.handleRegister(event)">
                
                <div class="mb-4">
                    <label class="block text-sm text-gray-600 mb-1">ชื่อ - นามสกุล</label>
                    <input type="text" id="regName" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary outline-none">
                </div>

                <div class="mb-4">
                    <label class="block text-sm text-gray-600 mb-1">หมายเลขโทรศัพท์</label>
                    <input type="tel" id="regPhone" pattern="[0-9]{10}" maxlength="10" placeholder="08xxxxxxxx" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary outline-none">
                </div>

                <div class="mb-4">
                    <label class="block text-sm text-gray-600 mb-1">อีเมล</label>
                    <div class="flex space-x-2">
                        <input type="email" id="emailInput" required class="flex-grow px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary outline-none">
                        <button type="button" onclick="window.requestOTP()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 text-sm whitespace-nowrap">รับรหัสยืนยัน</button>
                    </div>
                    <div id="otpSection" class="hidden mt-2">
                        <input type="text" placeholder="กรอกรหัส OTP 6 หลัก" class="w-full px-4 py-2 border border-green-300 bg-green-50 rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm text-gray-600 mb-1">สร้างรหัสผ่าน</label>
                    <input type="password" id="regPassword" onkeyup="window.validatePassword()" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary outline-none mb-2">
                    <div class="text-xs bg-gray-50 p-3 rounded-lg border">
                        <ul class="space-y-1">
                            <li id="rule-length" class="rule-fail"><i class="fa-solid fa-xmark w-4"></i> ความยาวอย่างน้อย 12 ตัวอักษร</li>
                            <li id="rule-upper" class="rule-fail"><i class="fa-solid fa-xmark w-4"></i> ตัวพิมพ์ใหญ่ (A-Z) 1 ตัว</li>
                            <li id="rule-lower" class="rule-fail"><i class="fa-solid fa-xmark w-4"></i> ตัวพิมพ์เล็ก (a-z) 1 ตัว</li>
                            <li id="rule-number" class="rule-fail"><i class="fa-solid fa-xmark w-4"></i> ตัวเลข (0-9) 1 ตัว</li>
                            <li id="rule-special" class="rule-fail"><i class="fa-solid fa-xmark w-4"></i> อักขระพิเศษ (!@#$%^&*) 1 ตัว</li>
                        </ul>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm text-gray-600 mb-1">ยืนยันรหัสผ่าน</label>
                    <input type="password" id="regConfirmPassword" onkeyup="window.checkPasswordMatch()" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary outline-none">
                    <p id="passwordMatchError" class="text-red-500 text-xs mt-1 hidden">รหัสผ่านไม่ตรงกัน</p>
                </div>

                <div class="mb-6">
                    <label class="block text-sm text-gray-600 mb-1">รหัสความปลอดภัย</label>
                    <div class="flex items-center space-x-2 mb-2">
                        <div id="captchaBox" class="bg-gray-100 border border-gray-300 font-mono text-xl tracking-[0.2em] px-4 py-2 rounded-lg font-bold text-gray-700 select-none w-32 text-center"></div>
                        <button type="button" onclick="window.generateCaptcha()" class="p-2 text-gray-500 hover:text-primary transition" title="เปลี่ยนรหัส"><i class="fa-solid fa-rotate-right"></i></button>
                        <button type="button" onclick="window.speakCaptcha()" class="p-2 text-gray-500 hover:text-primary transition" title="อ่านออกเสียง"><i class="fa-solid fa-volume-high"></i></button>
                    </div>
                    <input type="text" id="captchaInput" placeholder="กรอกตัวเลขที่เห็น" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-primary outline-none">
                </div>

                <div class="mb-6 border-t pt-4">
                    <label class="flex items-start cursor-pointer">
                        <input type="checkbox" required class="mt-1 mr-2 w-4 h-4 text-primary bg-gray-100 border-gray-300 rounded focus:ring-primary">
                        <span class="text-xs text-gray-600 leading-relaxed">
                            ฉันยินยอมให้ TAPPY เก็บรวบรวม ใช้ และประมวลผลข้อมูลส่วนบุคคลของฉันตามวัตถุประสงค์ที่ระบุไว้ในนโยบายความเป็นส่วนตัว
                        </span>
                    </label>
                </div>

                <button type="submit" id="btnRegister" class="w-full bg-primary text-white py-2 rounded-lg hover:bg-gray-800 transition font-medium">สมัครสมาชิก</button>
                
                <p class="mt-4 text-center text-sm text-gray-600">
                    <a href="#" onclick="window.togglePage('loginPage')" class="hover:underline"><i class="fa-solid fa-arrow-left mr-1"></i> กลับไปหน้าเข้าสู่ระบบ</a>
                </p>
            </form>
        </div>
    </div>

    <script type="module">
        // 1. นำเข้า Firebase SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword,
            signInWithPopup,
            GoogleAuthProvider,
            FacebookAuthProvider
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // 2. ใส่กุญแจ Config
        const firebaseConfig = {
            apiKey: "AIzaSyAzPmv7OVKbm2jBvBZKr16gRBjmplB9rEU",
            authDomain: "tappy-boking.firebaseapp.com",
            projectId: "tappy-boking",
            storageBucket: "tappy-boking.firebasestorage.app",
            messagingSenderId: "155079306623",
            appId: "1:155079306623:web:2c7e73cc6e619247c6be4a",
            measurementId: "G-MCGN6GEM87"
        };

        // 3. เริ่มต้นการทำงาน Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ================= UI LOGIC =================
        window.currentCaptcha = "";
        
        window.togglePage = (pageId) => {
            document.getElementById('loginPage').classList.add('hidden-section');
            document.getElementById('registerPage').classList.add('hidden-section');
            document.getElementById(pageId).classList.remove('hidden-section');
            if(pageId === 'registerPage') window.generateCaptcha();
        }

        window.requestOTP = () => {
            const email = document.getElementById('emailInput').value;
            if(!email) return alert("กรุณากรอกอีเมลก่อนรับรหัส OTP");
            document.getElementById('otpSection').classList.remove('hidden');
            alert(`ระบบได้ส่งรหัส OTP ไปยัง ${email} เรียบร้อยแล้ว (จำลอง)`);
        }

        window.validatePassword = () => {
            const pwd = document.getElementById('regPassword').value;
            const rules = [
                { id: 'rule-length', regex: /.{12,}/ },
                { id: 'rule-upper', regex: /[A-Z]/ },
                { id: 'rule-lower', regex: /[a-z]/ },
                { id: 'rule-number', regex: /[0-9]/ },
                { id: 'rule-special', regex: /[!@#$%^&*]/ }
            ];
            rules.forEach(rule => {
                const el = document.getElementById(rule.id);
                if (rule.regex.test(pwd)) {
                    el.className = 'rule-pass';
                    el.innerHTML = `<i class="fa-solid fa-check w-4"></i> ${el.innerText}`;
                } else {
                    el.className = 'rule-fail';
                    el.innerHTML = `<i class="fa-solid fa-xmark w-4"></i> ${el.innerText}`;
                }
            });
            window.checkPasswordMatch();
        }

        window.checkPasswordMatch = () => {
            const pwd = document.getElementById('regPassword').value;
            const confirmPwd = document.getElementById('regConfirmPassword').value;
            const errorMsg = document.getElementById('passwordMatchError');
            if (confirmPwd.length > 0 && pwd !== confirmPwd) errorMsg.classList.remove('hidden');
            else errorMsg.classList.add('hidden');
        }

        window.generateCaptcha = () => {
            window.currentCaptcha = Math.floor(100000 + Math.random() * 900000).toString();
            document.getElementById('captchaBox').innerText = window.currentCaptcha;
            document.getElementById('captchaInput').value = "";
        }

        window.speakCaptcha = () => {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(window.currentCaptcha.split('').join(' '));
                utterance.lang = 'th-TH'; utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            }
        }

        // ================= FIREBASE AUTHENTICATION LOGIC =================
        
        // สมัครสมาชิกด้วย Email & Password
        window.handleRegister = async (e) => {
            e.preventDefault();
            const inputCaptcha = document.getElementById('captchaInput').value;
            if(inputCaptcha !== window.currentCaptcha) return alert("รหัสความปลอดภัยไม่ถูกต้อง");
            if(document.querySelectorAll('.rule-fail').length > 0) return alert("รหัสผ่านไม่ตรงเงื่อนไข");
            if(document.getElementById('regPassword').value !== document.getElementById('regConfirmPassword').value) return alert("รหัสผ่านไม่ตรงกัน");

            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('regPassword').value;
            const btn = document.getElementById('btnRegister');
            btn.innerText = "กำลังสร้างบัญชี...";

            try {
                await createUserWithEmailAndPassword(auth, email, password);
                alert("สร้างบัญชีสำเร็จ! ระบบจะพาท่านไปหน้าเข้าสู่ระบบ");
                document.getElementById('registerForm').reset();
                window.togglePage('loginPage');
            } catch (error) {
                alert("การสมัครล้มเหลว: " + error.message);
            } finally {
                btn.innerText = "สมัครสมาชิก";
            }
        }

        // เข้าสู่ระบบด้วย Email & Password
        window.handleLogin = async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('btnLogin');
            btn.innerText = "กำลังตรวจสอบ...";

            try {
                await signInWithEmailAndPassword(auth, email, password);
                alert("เข้าสู่ระบบสำเร็จ! พาไปหน้าจองคิว...");
                // สำหรับเชื่อมโยงไปยังหน้าจองคิวในอนาคต
            } catch (error) {
                alert("อีเมลหรือรหัสผ่านไม่ถูกต้อง");
            } finally {
                btn.innerText = "เข้าสู่ระบบ";
            }
        }

        // ล็อกอินด้วย Social (Google / Facebook)
        window.handleSocialAuth = async (providerName) => {
            let provider;
            if (providerName === 'google') provider = new GoogleAuthProvider();
            if (providerName === 'facebook') provider = new FacebookAuthProvider();

            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                alert(`เข้าสู่ระบบสำเร็จ! ยินดีต้อนรับคุณ ${user.displayName || user.email}`);
            } catch (error) {
                alert("การล็อกอินโซเชียลถูกยกเลิก หรือมีข้อผิดพลาด: " + error.message);
            }
        }
    </script>
</body>
</html>
