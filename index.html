<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAPPY | ระบบสมาชิกและจองคิว</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    fontFamily: { sans: ['Sarabun', 'sans-serif'] }, 
                    colors: { primary: '#0f172a', line: '#06c755' } 
                }
            }
        }
    </script>
    <style>
        body { background: #f1f5f9; font-family: 'Sarabun', sans-serif; font-size: 15px; }
        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .transparent-logo { mix-blend-mode: multiply; }
        .hidden-section { display: none; }
        .rule-pass { color: #059669; }
        .rule-fail { color: #dc2626; }
        ::-webkit-scrollbar { display: none; }
        
        /* หน้า Loading ตัวหมุนตามเงื่อนไขข้อ 3 */
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #0f172a;
            border-radius: 50%; width: 44px; height: 44px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 relative">

    <div id="globalLoader" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="loader mb-4"></div>
        <p class="text-primary font-semibold text-lg tracking-wide">กำลังตรวจสอบสิทธิ์...</p>
    </div>

    <div id="customPopup" class="fixed inset-0 flex items-center justify-center z-50 hidden bg-black bg-opacity-50 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-[320px] w-full mx-4 transform transition-all scale-95 opacity-0 text-center" id="popupContent">
            <div id="popupIcon" class="mb-3 text-5xl"></div>
            <h3 id="popupTitle" class="text-xl font-bold mb-2"></h3>
            <p id="popupMessage" class="text-gray-600 mb-6 text-sm leading-relaxed"></p>
            <button onclick="window.closePopup()" id="popupBtn" class="w-full bg-primary text-white py-2.5 rounded-xl hover:bg-gray-800 transition font-bold shadow-md tracking-wide text-sm">ตกลง</button>
        </div>
    </div>

    <div class="w-full max-w-[420px] glass-card rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-gray-100 overflow-hidden my-4 hidden" id="mainContainer">
        
        <div class="pt-10 pb-4 flex flex-col items-center">
            <img src="https://img1.pic.in.th/images/IMG_0018.png" alt="Logo" class="h-20 w-auto object-contain transparent-logo mb-2">
            <h1 class="text-xl font-bold text-primary tracking-wide">ระบบสมาชิก TAPPY</h1>
            <p class="text-gray-500 text-sm">กรุณาเข้าสู่ระบบเพื่อดำเนินการ</p>
        </div>

        <div id="loginPage" class="px-8 pb-10">
            <form id="loginForm" onsubmit="window.handleLogin(event)" class="space-y-4">
                <div>
                    <input type="email" id="loginEmail" placeholder="อีเมล" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none transition duration-200">
                </div>
                <div>
                    <input type="password" id="loginPassword" placeholder="รหัสผ่าน" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none transition duration-200">
                </div>
                <button type="submit" id="btnLogin" class="w-full bg-primary text-white py-3 rounded-xl font-semibold hover:bg-black transition duration-200 shadow-md tracking-wide">เข้าสู่ระบบ</button>
            </form>

            <div class="my-6 flex items-center text-xs text-gray-400 uppercase tracking-widest font-semibold">
                <hr class="flex-grow border-gray-200"><span class="mx-3">หรือ</span><hr class="flex-grow border-gray-200">
            </div>

            <div class="space-y-3">
                <button type="button" onclick="window.handleSocialAuth('google')" class="w-full flex items-center justify-center border border-gray-200 py-3 rounded-xl hover:bg-gray-50 transition duration-200 text-sm font-semibold text-gray-700">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="h-5 w-5 mr-3"> เข้าใช้งานด้วย Google
                </button>
                <button type="button" onclick="window.handleSocialAuth('line')" class="w-full flex items-center justify-center bg-line text-white py-3 rounded-xl hover:bg-green-600 transition duration-200 text-sm font-semibold shadow-sm">
                    <i class="fa-brands fa-line text-xl mr-3"></i> เข้าใช้งานด้วย LINE
                </button>
            </div>

            <p class="mt-8 text-center text-sm text-gray-600 font-medium">
                ยังไม่มีบัญชี? <a href="#" onclick="window.togglePage('registerPage')" class="text-primary font-bold hover:underline">สมัครสมาชิก</a>
            </p>
        </div>

        <div id="registerPage" class="hidden-section px-8 pb-10">
            <hr class="mb-6 border-gray-200">
            <h2 class="text-lg font-bold text-center mb-4 text-primary">สร้างบัญชีใหม่</h2>
            
            <form id="registerForm" onsubmit="window.handleRegister(event)" class="space-y-4">
                
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 mb-6">
                    <label class="block text-primary mb-2 text-sm font-bold text-center">ผูกบัญชีโซเชียลเพื่อสมัครสมาชิก</label>
                    <div class="flex space-x-2">
                        <button type="button" id="btnLinkGoogle" onclick="window.linkSocialAuth('google')" class="flex-1 flex items-center justify-center border border-gray-300 bg-white py-2 rounded-lg hover:bg-gray-50 transition text-gray-600 shadow-sm text-sm font-semibold">
                            <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="h-4 w-4 mr-2"> ผูก Google
                        </button>
                        <button type="button" id="btnLinkLine" onclick="window.linkSocialAuth('line')" class="flex-1 flex items-center justify-center bg-line text-white py-2 rounded-lg hover:bg-[#00a300] transition shadow-sm text-sm font-semibold">
                            <i class="fa-brands fa-line mr-2 text-base"></i> ผูก LINE
                        </button>
                    </div>
                </div>

                <div>
                    <input type="text" id="regName" placeholder="ชื่อ - นามสกุล" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none">
                </div>

                <div>
                    <input type="tel" id="regPhone" pattern="[0-9]{10}" maxlength="10" placeholder="เบอร์โทรศัพท์ (10 หลัก)" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none">
                </div>

                <div class="flex space-x-2">
                    <input type="email" id="emailInput" placeholder="อีเมล" required class="flex-grow px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none">
                    <button type="button" onclick="window.requestOTP()" class="px-3 py-2.5 bg-gray-200 text-gray-700 rounded-xl hover:bg-gray-300 transition text-sm font-bold whitespace-nowrap">รับ OTP</button>
                </div>
                
                <div id="otpSection" class="hidden">
                    <input type="text" id="otpInput" placeholder="รหัส OTP 6 หลัก" class="w-full px-4 py-2.5 border border-green-400 bg-green-50 rounded-xl focus:ring-2 focus:ring-green-500 outline-none text-sm font-semibold tracking-widest text-center">
                </div>

                <div>
                    <input type="text" id="regUsername" placeholder="ชื่อผู้ใช้ (Username)" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none">
                </div>

                <div>
                    <input type="password" id="regPassword" placeholder="สร้างรหัสผ่าน" onkeyup="window.validatePassword()" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none">
                    <div class="text-xs bg-gray-50 p-3 mt-2 rounded-xl border border-gray-200 text-gray-500 font-medium">
                        <ul class="space-y-1.5 leading-tight">
                            <li id="rule-length" class="rule-fail"><i class="fa-solid fa-xmark w-4 text-center"></i> 12 ตัวอักษรขึ้นไป</li>
                            <li id="rule-upper" class="rule-fail"><i class="fa-solid fa-xmark w-4 text-center"></i> พิมพ์ใหญ่ (A-Z) 1 ตัว</li>
                            <li id="rule-lower" class="rule-fail"><i class="fa-solid fa-xmark w-4 text-center"></i> พิมพ์เล็ก (a-z) 1 ตัว</li>
                            <li id="rule-number" class="rule-fail"><i class="fa-solid fa-xmark w-4 text-center"></i> ตัวเลข (0-9) 1 ตัว</li>
                            <li id="rule-special" class="rule-fail"><i class="fa-solid fa-xmark w-4 text-center"></i> อักขระพิเศษ 1 ตัว</li>
                        </ul>
                    </div>
                </div>

                <div>
                    <input type="password" id="regConfirmPassword" placeholder="ยืนยันรหัสผ่าน" onkeyup="window.checkPasswordMatch()" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none">
                    <p id="passwordMatchError" class="text-red-500 text-xs mt-1 ml-1 hidden font-semibold">รหัสผ่านไม่ตรงกัน</p>
                </div>

                <div>
                    <label class="block text-gray-500 mb-1 text-xs ml-1 font-semibold">รหัสความปลอดภัย</label>
                    <div class="flex items-center space-x-2 mb-2">
                        <div id="captchaBox" class="bg-gray-100 border border-gray-300 font-mono text-xl tracking-[0.2em] px-3 py-2 rounded-xl font-bold text-gray-600 select-none w-32 text-center"></div>
                        <button type="button" onclick="window.generateCaptcha()" class="p-2.5 text-gray-400 hover:text-primary transition bg-gray-50 border border-gray-200 rounded-xl"><i class="fa-solid fa-rotate-right"></i></button>
                        <button type="button" onclick="window.speakCaptcha()" class="p-2.5 text-gray-400 hover:text-primary transition bg-gray-50 border border-gray-200 rounded-xl"><i class="fa-solid fa-volume-high"></i></button>
                    </div>
                    <input type="text" id="captchaInput" placeholder="กรอกตัวเลขด้านบน" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none font-semibold text-center tracking-widest">
                </div>

                <div class="pt-2">
                    <label class="flex items-start cursor-pointer">
                        <input type="checkbox" required class="mt-1 mr-2 w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary">
                        <span class="text-xs text-gray-500 leading-tight font-medium">
                            ฉันยินยอมให้ TAPPY เก็บรวบรวมและประมวลผลข้อมูลส่วนบุคคล
                        </span>
                    </label>
                </div>

                <button type="submit" id="btnRegister" class="w-full bg-primary text-white py-3 rounded-xl hover:bg-black transition font-bold shadow-md mt-2 tracking-wide">ยืนยันการสมัครสมาชิก</button>
                
                <p class="mt-4 text-center text-sm text-gray-500">
                    <a href="#" onclick="window.togglePage('loginPage')" class="hover:underline font-bold text-primary"><i class="fa-solid fa-arrow-left mr-1"></i> ย้อนกลับ</a>
                </p>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { 
            getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
            signInWithRedirect, getRedirectResult, GoogleAuthProvider, OAuthProvider, updatePassword
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzPmv7OVKbm2jBvBZKr16gRBjmplB9rEU",
            authDomain: "tappy-boking.firebaseapp.com",
            projectId: "tappy-boking",
            storageBucket: "tappy-boking.firebasestorage.app",
            messagingSenderId: "155079306623",
            appId: "1:155079306623:web:2c7e73cc6e619247c6be4a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ================= CUSTOM POPUP CONTROL =================
        let popupCallback = null;
        window.showPopup = (title, message, type = 'info', btnText = 'ตกลง', callback = null) => {
            const popup = document.getElementById('customPopup');
            const content = document.getElementById('popupContent');
            const icon = document.getElementById('popupIcon');
            const titleEl = document.getElementById('popupTitle');
            const msgEl = document.getElementById('popupMessage');
            const btn = document.getElementById('popupBtn');
            
            popupCallback = callback;
            titleEl.innerText = title;
            msgEl.innerText = message;
            btn.innerText = btnText;

            if (type === 'success') {
                icon.innerHTML = '<i class="fa-solid fa-circle-check text-green-500"></i>';
                titleEl.className = "text-xl font-bold mb-1 text-green-600";
            } else if (type === 'error') {
                icon.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500"></i>';
                titleEl.className = "text-xl font-bold mb-1 text-red-600";
            } else {
                icon.innerHTML = '<i class="fa-solid fa-circle-info text-blue-500"></i>';
                titleEl.className = "text-xl font-bold mb-1 text-blue-600";
            }

            popup.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        };

        window.closePopup = () => {
            const popup = document.getElementById('customPopup');
            const content = document.getElementById('popupContent');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                popup.classList.add('hidden');
                if (popupCallback) { popupCallback(); popupCallback = null; }
            }, 200);
        };

        // ================= UI STATE NAVIGATION =================
        window.currentCaptcha = "";
        window.togglePage = (pageId) => {
            document.getElementById('loginPage').classList.add('hidden-section');
            document.getElementById('registerPage').classList.add('hidden-section');
            document.getElementById(pageId).classList.remove('hidden-section');
            if(pageId === 'registerPage') window.generateCaptcha();
        }

        window.hideLoader = () => {
            const loader = document.getElementById('globalLoader');
            loader.classList.add('opacity-0');
            setTimeout(() => {
                loader.classList.add('hidden');
                document.getElementById('mainContainer').classList.remove('hidden');
            }, 300);
        }

        // Helper ฟังก์ชันเปลี่ยนปุ่มผูกบัญชีเป็นสถานะผูกแล้ว (ข้อ 1)
        function updateLinkButtonStatus(providerName) {
            const btn = document.getElementById(providerName === 'Google' ? 'btnLinkGoogle' : 'btnLinkLine');
            if (btn) {
                btn.className = "flex-1 flex items-center justify-center bg-green-50 border border-green-500 text-green-600 py-2 rounded-lg text-sm font-bold shadow-sm cursor-not-allowed";
                btn.innerHTML = `<i class="fa-solid fa-circle-check mr-2"></i> ผูกบัญชีด้วย ${providerName} แล้ว`;
                btn.removeAttribute('onclick'); // ป้องกันการกดซ้ำ
            }
        }

        // ================= SMART AUTH CORE LOGIC =================
        
        getRedirectResult(auth).then(async (result) => {
            if (result !== null) {
                const user = result.user;
                const userSnap = await getDoc(doc(db, "users", user.uid));
                const actionOrigin = sessionStorage.getItem('auth_action_origin');

                if (userSnap.exists()) {
                    // [เงื่อนไขข้อ 3] มีบัญชีอยู่แล้ว -> ค้างหน้าจอโหลดหมุน (Global Loader) และพุ่งเข้า Dashboard เลย
                    window.location.href = 'dashboard.html';
                } else {
                    // ยังไม่มีฐานข้อมูลสมาชิกในระบบ (ลูกค้าใหม่)
                    window.hideLoader();

                    if (actionOrigin === 'register_page') {
                        // [เงื่อนไขข้อ 1] เกิดจากการกดผูกบัญชีในหน้าสมัครสมาชิก -> พากลับหน้าเดิมและปรับปุ่มเป็น "ผูกแล้ว"
                        window.togglePage('registerPage');
                        
                        if(user.email) document.getElementById('emailInput').value = user.email;
                        if(user.displayName) document.getElementById('regName').value = user.displayName;
                        
                        const pId = result.providerId;
                        if (pId === 'google.com') updateLinkButtonStatus('Google');
                        if (pId === 'oidc.line') updateLinkButtonStatus('LINE');
                        
                        window.showPopup("ผูกบัญชีสำเร็จ", "ผูกระบบโซเชียลเรียบร้อย กรุณากรอกข้อมูลส่วนอื่นให้ครบถ้วนและกดยืนยันการสมัครสมาชิกด้านล่างครับ", "success");
                    } else {
                        // [เงื่อนไขข้อ 2] ลูกค้าใหม่กดปุ่มโซเชียลจากหน้าแรกเลย -> ขึ้นเตือนแจ้งไม่พบบัญชี พร้อมปุ่มสร้างบัญชี
                        window.showPopup(
                            "ไม่พบบัญชี", 
                            "ไม่พบบัญชีที่ผูกกับโซเชียลนี้ สร้างบัญชีเลยเพื่อเริ่มต้นใช้งาน", 
                            "error", 
                            "สร้างบัญชีเลย", 
                            () => {
                                window.togglePage('registerPage');
                                // อำนวยความสะดวก: ดึงข้อมูลและปรับสถานะผูกให้ทันทีตามกลไกข้อ 1
                                if(user.email) document.getElementById('emailInput').value = user.email;
                                if(user.displayName) document.getElementById('regName').value = user.displayName;
                                
                                const pId = result.providerId;
                                if (pId === 'google.com') updateLinkButtonStatus('Google');
                                if (pId === 'oidc.line') updateLinkButtonStatus('LINE');
                            }
                        );
                    }
                }
            } else {
                // เปิดเว็บหน้าปกติ ไม่ได้มาจากการ Redirect
                window.hideLoader();
            }
        }).catch((error) => {
            console.error("Auth Error:", error);
            window.hideLoader();
            window.showPopup("ข้อผิดพลาด", "การเชื่อมต่อสิทธิ์ล้มเหลว กรุณาลองอีกครั้ง", "error");
        });

        // ฟังก์ชันเข้าใช้งานด้วย Social จากหน้าแรก (ทางเข้าล็อกอินปกติ)
        window.handleSocialAuth = (providerName) => {
            sessionStorage.setItem('auth_action_origin', 'login_page');
            let provider = providerName === 'google' ? new GoogleAuthProvider() : new OAuthProvider('oidc.line');
            signInWithRedirect(auth, provider);
        }

        // ฟังก์ชันผูกบัญชีโซเชียลจากหน้าสร้างบัญชีใหม่ (ข้อ 1)
        window.linkSocialAuth = (providerName) => {
            sessionStorage.setItem('auth_action_origin', 'register_page');
            let provider = providerName === 'google' ? new GoogleAuthProvider() : new OAuthProvider('oidc.line');
            signInWithRedirect(auth, provider);
        }

        // ================= FORM SUBMISSION LOGIC =================
        
        window.handleRegister = async (e) => {
            e.preventDefault();
            
            const inputCaptcha = document.getElementById('captchaInput').value;
            if(inputCaptcha !== window.currentCaptcha) {
                window.generateCaptcha();
                return window.showPopup("ผิดพลาด", "รหัสความปลอดภัยไม่ถูกต้อง", "error");
            }
            if(document.querySelectorAll('.rule-fail').length > 0) return window.showPopup("ผิดพลาด", "รหัสผ่านยังไม่ตรงเงื่อนไขความปลอดภัย", "error");
            if(document.getElementById('regPassword').value !== document.getElementById('regConfirmPassword').value) return window.showPopup("ผิดพลาด", "รหัสผ่านไม่ตรงกัน", "error");

            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('regPassword').value;
            const fullName = document.getElementById('regName').value;
            const phone = document.getElementById('regPhone').value;
            const username = document.getElementById('regUsername').value;
            const btn = document.getElementById('btnRegister');
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังบันทึกข้อมูลสมาชิก...';
            btn.disabled = true;

            try {
                let uid = "";
                // ตรวจสอบว่าผู้ใช้ผ่านกระบวนการยืนยันโซเชียลค้างไว้อยู่ใน Session หรือไม่
                if (auth.currentUser) {
                    uid = auth.currentUser.uid;
                    // กำหนดรหัสผ่านเสริมให้บัญชีโซเชียล เพื่อให้สามารถล็อกอินด้วยอีเมลได้เช่นกัน
                    await updatePassword(auth.currentUser, password);
                } else {
                    // หากไม่ได้ผูกโซเชียลมาเลย ให้สมัครแบบ Email/Password ดั้งเดิม
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    uid = userCredential.user.uid;
                }
                
                // บันทึกโปรไฟล์ลง Firestore Database
                await setDoc(doc(db, "users", uid), {
                    fullName: fullName, email: email, phone: phone, username: username,
                    provider: auth.currentUser ? "social_linked" : "email", 
                    createdAt: new Date()
                });

                // เมื่อลงทะเบียนเสร็จสมบูรณ์ พาทะลุเข้าหน้า Dashboard ทันทีตามเจตนารมณ์ระบบแอปพลิเคชันจริง
                window.showPopup("สมัครสมาชิกสำเร็จ!", "ระบบบันทึกบัญชีที่ผูกเรียบร้อยแล้ว กำลังนำท่านเข้าสู่แดชบอร์ด", "success", "ตกลง", () => {
                    window.location.href = 'dashboard.html';
                });
            } catch (error) {
                window.showPopup("สมัครสมาชิกไม่สำเร็จ", error.message, "error");
                btn.innerText = "ยืนยันการสมัครสมาชิก";
                btn.disabled = false;
            }
        }

        window.handleLogin = async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('btnLogin');
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังตรวจสอบ...';
            btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                window.showPopup("ผิดพลาด", "อีเมลหรือรหัสผ่านไม่ถูกต้อง", "error");
                btn.innerText = "เข้าสู่ระบบ";
                btn.disabled = false;
            }
        }

        // ================= UTILITY OPERATIONS =================
        window.requestOTP = () => {
            const email = document.getElementById('emailInput').value;
            if(!email) return window.showPopup("ผิดพลาด", "กรุณากรอกอีเมลก่อนรับรหัส", "error");
            document.getElementById('otpSection').classList.remove('hidden');
            window.showPopup("สำเร็จ", "ระบบได้จำลองการส่งรหัส OTP ไปที่อีเมลของคุณแล้ว", "success");
        }

        window.validatePassword = () => {
            const pwd = document.getElementById('regPassword').value;
            const rules = [
                { id: 'rule-length', regex: /.{12,}/ }, { id: 'rule-upper', regex: /[A-Z]/ },
                { id: 'rule-lower', regex: /[a-z]/ }, { id: 'rule-number', regex: /[0-9]/ },
                { id: 'rule-special', regex: /[!@#$%^&*]/ }
            ];
            rules.forEach(rule => {
                const el = document.getElementById(rule.id);
                if (rule.regex.test(pwd)) {
                    el.className = 'rule-pass'; el.innerHTML = `<i class="fa-solid fa-check w-4 text-center"></i> ${el.innerText.trim()}`;
                } else {
                    el.className = 'rule-fail'; el.innerHTML = `<i class="fa-solid fa-xmark w-4 text-center"></i> ${el.innerText.trim()}`;
                }
            });
            window.checkPasswordMatch();
        }

        window.checkPasswordMatch = () => {
            const pwd = document.getElementById('regPassword').value;
            const confirmPwd = document.getElementById('regConfirmPassword').value;
            const errorMsg = document.getElementById('passwordMatchError');
            if (confirmPwd.length > 0 && pwd !== confirmPwd) errorMsg.classList.remove('hidden');
            else errorMsg.classList.add('hidden');
        }

        window.generateCaptcha = () => {
            window.currentCaptcha = Math.floor(100000 + Math.random() * 900000).toString();
            document.getElementById('captchaBox').innerText = window.currentCaptcha;
            document.getElementById('captchaInput').value = "";
        }

        window.speakCaptcha = () => {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(window.currentCaptcha.split('').join(' '));
                utterance.lang = 'th-TH'; utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            }
        }
    </script>
</body>
</html>
