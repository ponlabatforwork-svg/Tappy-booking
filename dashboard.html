<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAPPY - จองคิวรับบริการ</title>
    
    <!-- ฟอนต์ Sarabun (มาตรฐาน Web Font ของ TH Sarabun) -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    fontFamily: { sans: ['Sarabun', 'sans-serif'] }, 
                    colors: { primary: '#1e293b', secondary: '#64748b' } 
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #f8fafc; 
            font-size: 1.125rem; /* ปรับขนาดฟอนต์ Sarabun ให้ใหญ่อ่านง่าย */
        }
        /* Custom Radio Button Style สำหรับเลือกเวลา */
        .time-slot-label input:checked + div {
            background-color: #1e293b;
            color: white;
            border-color: #1e293b;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col relative hidden" id="bodyContent">

    <!-- ==================== CUSTOM POPUP MODAL ==================== -->
    <div id="customPopup" class="fixed inset-0 flex items-center justify-center z-50 hidden bg-black bg-opacity-40 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full mx-4 transform transition-all scale-95 opacity-0" id="popupContent">
            <div class="text-center">
                <div id="popupIcon" class="mb-4 text-5xl"></div>
                <h3 id="popupTitle" class="text-2xl font-bold mb-2"></h3>
                <p id="popupMessage" class="text-gray-600 mb-6 text-lg"></p>
                <button onclick="window.closePopup()" id="popupBtn" class="w-full bg-primary text-white py-2.5 rounded-lg hover:bg-gray-800 transition font-medium text-lg shadow-md">ตกลง</button>
            </div>
        </div>
    </div>

    <!-- ==================== NAVBAR ==================== -->
    <nav class="bg-white shadow-sm border-b border-gray-200 px-6 py-4 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center space-x-3">
            <img src="https://img2.pic.in.th/18826.png" alt="Logo" class="h-10 object-contain">
            <span class="font-bold text-xl text-primary tracking-wide">TAPPY</span>
        </div>
        <div class="flex items-center space-x-4">
            <div class="hidden md:block text-right">
                <p class="text-sm text-gray-500 leading-tight">ยินดีต้อนรับ</p>
                <p id="userNameDisplay" class="text-lg font-semibold text-primary leading-tight">กำลังโหลด...</p>
            </div>
            <div class="h-8 w-px bg-gray-300 hidden md:block"></div>
            <button onclick="window.handleLogout()" class="text-red-500 hover:text-red-700 hover:bg-red-50 px-4 py-2 rounded-lg transition font-medium flex items-center shadow-sm border border-red-100">
                <i class="fa-solid fa-arrow-right-from-bracket mr-2"></i> ออกจากระบบ
            </button>
        </div>
    </nav>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="flex-grow flex items-center justify-center p-4 sm:p-8">
        <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 p-6 sm:p-10">
            
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-50 text-primary mb-4">
                    <i class="fa-regular fa-calendar-check text-3xl"></i>
                </div>
                <h2 class="text-3xl font-bold text-gray-800 mb-2">จองคิวรับบริการ</h2>
                <p class="text-gray-500 text-lg">กรุณาระบุข้อมูลบริการ วัน และเวลาที่คุณต้องการนัดหมาย</p>
            </div>
            
            <form id="bookingForm" onsubmit="window.submitBooking(event)">
                
                <!-- 1. เลือกบริการ -->
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2"><i class="fa-solid fa-layer-group mr-2 text-primary"></i>ประเภทบริการ</label>
                    <select id="serviceType" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition bg-gray-50 text-lg">
                        <option value="" disabled selected>-- กรุณาเลือกบริการที่ต้องการ --</option>
                        <option value="Consultation">ปรึกษาผู้เชี่ยวชาญ (Consultation)</option>
                        <option value="Standard Service">บริการมาตรฐาน (Standard Service)</option>
                        <option value="Premium Service">บริการพิเศษ (Premium Service)</option>
                        <option value="Follow-up">ติดตามผล (Follow-up)</option>
                    </select>
                </div>

                <!-- 2. เลือกวันที่ -->
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2"><i class="fa-regular fa-calendar mr-2 text-primary"></i>เลือกวันที่</label>
                    <input type="date" id="bookingDate" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition bg-gray-50 text-lg">
                </div>

                <!-- 3. เลือกเวลา (Radio Buttons Grid) -->
                <div class="mb-10">
                    <label class="block text-gray-700 font-semibold mb-3"><i class="fa-regular fa-clock mr-2 text-primary"></i>เลือกช่วงเวลา</label>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                        
                        <label class="cursor-pointer time-slot-label">
                            <input type="radio" name="timeSlot" value="09:00 - 10:00" required class="sr-only">
                            <div class="text-center py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition text-lg font-medium text-gray-600">09:00 - 10:00</div>
                        </label>
                        
                        <label class="cursor-pointer time-slot-label">
                            <input type="radio" name="timeSlot" value="10:00 - 11:00" class="sr-only">
                            <div class="text-center py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition text-lg font-medium text-gray-600">10:00 - 11:00</div>
                        </label>
                        
                        <label class="cursor-pointer time-slot-label">
                            <input type="radio" name="timeSlot" value="11:00 - 12:00" class="sr-only">
                            <div class="text-center py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition text-lg font-medium text-gray-600">11:00 - 12:00</div>
                        </label>

                        <label class="cursor-pointer time-slot-label">
                            <input type="radio" name="timeSlot" value="13:00 - 14:00" class="sr-only">
                            <div class="text-center py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition text-lg font-medium text-gray-600">13:00 - 14:00</div>
                        </label>

                        <label class="cursor-pointer time-slot-label">
                            <input type="radio" name="timeSlot" value="14:00 - 15:00" class="sr-only">
                            <div class="text-center py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition text-lg font-medium text-gray-600">14:00 - 15:00</div>
                        </label>
                        
                        <label class="cursor-pointer time-slot-label">
                            <input type="radio" name="timeSlot" value="15:00 - 16:00" class="sr-only">
                            <div class="text-center py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition text-lg font-medium text-gray-600">15:00 - 16:00</div>
                        </label>

                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="btnSubmit" class="w-full bg-primary text-white py-3.5 rounded-lg hover:bg-gray-800 transition font-bold text-xl shadow-lg flex items-center justify-center">
                    <i class="fa-solid fa-calendar-check mr-2"></i> ยืนยันการจองคิว
                </button>
            </form>
        </div>
    </main>

    <!-- ==================== FIREBASE & LOGIC SCRIPT ==================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // ================= FIREBASE CONFIG =================
        const firebaseConfig = {
            apiKey: "AIzaSyAzPmv7OVKbm2jBvBZKr16gRBjmplB9rEU",
            authDomain: "tappy-boking.firebaseapp.com",
            projectId: "tappy-boking",
            storageBucket: "tappy-boking.firebasestorage.app",
            messagingSenderId: "155079306623",
            appId: "1:155079306623:web:2c7e73cc6e619247c6be4a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let userData = null;

        // ================= CUSTOM POPUP LOGIC =================
        let popupCallback = null;

        window.showPopup = (title, message, type = 'info', callback = null) => {
            const popup = document.getElementById('customPopup');
            const content = document.getElementById('popupContent');
            const icon = document.getElementById('popupIcon');
            const titleEl = document.getElementById('popupTitle');
            const msgEl = document.getElementById('popupMessage');
            
            popupCallback = callback;
            titleEl.innerText = title;
            msgEl.innerText = message;

            if (type === 'success') {
                icon.innerHTML = '<i class="fa-solid fa-circle-check text-green-500"></i>';
                titleEl.className = "text-2xl font-bold mb-2 text-green-600";
            } else if (type === 'error') {
                icon.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500"></i>';
                titleEl.className = "text-2xl font-bold mb-2 text-red-600";
            } else {
                icon.innerHTML = '<i class="fa-solid fa-circle-info text-blue-500"></i>';
                titleEl.className = "text-2xl font-bold mb-2 text-blue-600";
            }

            popup.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        };

        window.closePopup = () => {
            const popup = document.getElementById('customPopup');
            const content = document.getElementById('popupContent');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                popup.classList.add('hidden');
                if (popupCallback) {
                    popupCallback();
                    popupCallback = null;
                }
            }, 200);
        };

        // ================= AUTHENTICATION CHECK =================
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                
                // ดึงข้อมูลผู้ใช้จาก Firestore เพื่อหาชื่อที่แท้จริง
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        userData = userDoc.data();
                        document.getElementById('userNameDisplay').innerText = `คุณ ${userData.fullName || userData.username || user.email.split('@')[0]}`;
                    } else {
                        document.getElementById('userNameDisplay').innerText = `คุณ ${user.displayName || user.email.split('@')[0]}`;
                    }
                } catch (error) {
                    console.error("Error fetching user data:", error);
                    document.getElementById('userNameDisplay').innerText = `คุณ ${user.displayName || user.email.split('@')[0]}`;
                }

                // ป้องกันการเลือกวันที่ย้อนหลัง (ตั้งค่า min date เป็นวันนี้)
                // ดึงวันที่ปัจจุบันตามเวลาท้องถิ่น (Timezone ของผู้ใช้)
                const today = new Date();
                const dd = String(today.getDate()).padStart(2, '0');
                const mm = String(today.getMonth() + 1).padStart(2, '0'); // January is 0
                const yyyy = today.getFullYear();
                const todayString = yyyy + '-' + mm + '-' + dd;
                
                document.getElementById('bookingDate').setAttribute('min', todayString);
                
                // แสดงหน้าเว็บหลังจากการโหลดและตรวจสอบเสร็จสิ้น
                document.getElementById('bodyContent').classList.remove('hidden');

            } else {
                // หากยังไม่ได้เข้าสู่ระบบ ให้เด้งกลับไปหน้าเข้าสู่ระบบทันที
                window.location.href = 'index.html';
            }
        });

        // ================= LOGOUT LOGIC =================
        window.handleLogout = async () => {
            try {
                await signOut(auth);
                window.location.href = 'index.html';
            } catch (error) {
                window.showPopup("ข้อผิดพลาด", "เกิดข้อผิดพลาดในการออกจากระบบ กรุณาลองใหม่", "error");
            }
        };

        // ================= SUBMIT BOOKING LOGIC =================
        window.submitBooking = async (e) => {
            e.preventDefault();
            
            if (!currentUser) {
                return window.showPopup("ข้อผิดพลาด", "ไม่พบข้อมูลผู้ใช้ กรุณาเข้าสู่ระบบใหม่", "error", () => {
                    window.location.href = 'index.html';
                });
            }

            const service = document.getElementById('serviceType').value;
            const date = document.getElementById('bookingDate').value;
            const timeSlot = document.querySelector('input[name="timeSlot"]:checked').value;
            const btn = document.getElementById('btnSubmit');

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังดำเนินการ...';
            btn.disabled = true;

            try {
                // บันทึกข้อมูลการจองลง Collection 'bookings' ใน Firestore
                await addDoc(collection(db, "bookings"), {
                    userId: currentUser.uid,
                    userName: (userData && userData.fullName) ? userData.fullName : (currentUser.displayName || currentUser.email),
                    userEmail: currentUser.email,
                    userPhone: (userData && userData.phone) ? userData.phone : "",
                    serviceType: service,
                    bookingDate: date,
                    bookingTime: timeSlot,
                    status: "pending", // สถานะตั้งต้น: รอยืนยัน (pending)
                    timestamp: serverTimestamp() // เวลาที่กดจอง
                });

                // แจ้งเตือนสำเร็จ แล้วทำการเคลียร์ฟอร์ม
                window.showPopup("จองคิวสำเร็จ!", `ระบบได้บันทึกคิวของคุณในวันที่ ${date} เวลา ${timeSlot} เรียบร้อยแล้ว`, "success", () => {
                    document.getElementById('bookingForm').reset();
                });

            } catch (error) {
                console.error("Booking Error: ", error);
                window.showPopup("ไม่สามารถจองคิวได้", "เกิดข้อผิดพลาดในการบันทึกข้อมูล กรุณาลองใหม่อีกครั้ง", "error");
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-calendar-check mr-2"></i> ยืนยันการจองคิว';
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
